name: Notify on Push (Plesk handles deployment)
# ⚠️ Deployment is managed by Plesk Git Panel (Plan A)
# Plesk pulls from GitHub automatically when it receives a webhook call.
# Setup: Plesk → Domain → Git → Add Repository → Copy Webhook URL → GitHub Settings → Webhooks
# Deployment action configured in Plesk runs: npm run deploy

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Pushed to main
        run: echo "✅ Pushed to main — Plesk will pull and deploy automatically via webhook."

