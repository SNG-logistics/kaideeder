# KAIDEEDER.com — Nginx Reverse Proxy Configuration
# Place this file at: /etc/nginx/sites-available/kaideeder.com
# Then: ln -s /etc/nginx/sites-available/kaideeder.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name kaideeder.com www.kaideeder.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kaideeder.com www.kaideeder.com;

    # SSL — ใช้ Let's Encrypt (Certbot)
    ssl_certificate     /etc/letsencrypt/live/kaideeder.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaideeder.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Static files — serve directly via Next.js standalone
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Upload files (if stored in public/)
    location /uploads/ {
        alias /home/user/public_html/kaideeder/public/uploads/;
        expires 30d;
    }

    # Proxy all other requests → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
}
